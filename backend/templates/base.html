<!DOCTYPE html>
<html>
<head>
    <title>DaESD Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">BRFN Store</h2>
    {% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} mt-3" role="alert">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}
    {% block content %}{% endblock %}
</div>
<a class="btn btn-outline-secondary" href="{% url 'cart_page' %}">
  Basket{% if cart_item_count %} ({{ cart_item_count }}){% endif %}
</a>
</body>
</html>
