{% extends "layouts/auth_base.html" %}

{% block title %}Create Account{% endblock %}

{% block content %}
  <div class="brand">
    <div class="logo-dot"></div>
    <h1>BRFN</h1>
  </div>

  <p class="subtitle">
    Choose the type of account you want to create.
  </p>

  <div class="actions">
    <a class="auth-link-button" href="{% url 'register_customer' %}">Register as Customer</a>
    <a class="auth-link-button" href="{% url 'register_producer' %}">Register as Producer</a>
    <a class="auth-link-secondary" href="{% url 'login' %}">Already have an account? Log in</a>
  </div>
{% endblock %}
