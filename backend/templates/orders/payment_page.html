{% extends "base.html" %}
{% block title %}Payment | BRFN{% endblock %}

{% block content %}
<div class="glass p-4 mt-4" style="max-width: 720px;">
  <div class="mb-3">
    <h2 class="text-white mb-2">Pay for Order #{{ order.id }}</h2>
    <p class="text-soft mb-0">Confirm the payment for this order below.</p>
  </div>

  <div class="mb-4 p-3 rounded surface-tile">
    <div class="text-soft mb-1">Total Amount</div>
    <div class="h3 mb-0 text-danger">£{{ order.total|floatformat:2 }}</div>
  </div>

  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-success btn-lg btn-round">
      Confirm Payment
    </button>
  </form>
</div>
{% endblock %}
