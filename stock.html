<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Management</title>
<link rel="stylesheet" href="stock.css">
</head>
<body>

<header>
    <div class="logo">Producer Dashboard</div>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="stock.html">Stock</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1>Stock Management</h1>

    <button class="add-btn" onclick="addItem()">Add Item</button>

    <table id="stock-table">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Price ($)</th>
                <th>Stock</th>
                <th>Description</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Example Item</td>
                <td>10</td>
                <td>50</td>
                <td>Sample product</td>
                <td>
                    <button class="edit-btn" onclick="editItem('Example Item')">
                        Edit
                    </button>
                </td>
                <td>
                    <button class="delete-btn" onclick="deleteRow(this)">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<script>
function addItem() {
    const name = prompt("Enter item name:");
    const price = prompt("Enter price:");
    const stock = prompt("Enter stock amount:");
    const description = prompt("Enter description:");

    if (!name || !price || !stock) return;

    const table = document.getElementById("stock-table").getElementsByTagName("tbody")[0];
    const newRow = table.insertRow();

    newRow.innerHTML = `
        <td>${name}</td>
        <td>${price}</td>
        <td>${stock}</td>
        <td>${description || ""}</td>
        <td><button class="edit-btn" onclick="editItem('${name}')">Edit</button></td>
        <td><button class="delete-btn" onclick="deleteRow(this)">Delete</button></td>
    `;
}

function deleteRow(button) {
    const row = button.parentElement.parentElement;
    row.remove();
}

function editItem(itemName) {
    window.location.href = "edit-stock.html?item=" + encodeURIComponent(itemName);
}
</script>

</body>
</html>
